const FILMS=RAW_FILMS.map(([title,embedUrl,id,poster])=>{const year=title.match(/\b(19|20)\d{2}\b/);return{id,title,embedUrl,poster,year:year?Number(year[0]):null,category:categoryFor(title)}});
const byId=id=>document.getElementById(id),all=s=>[...document.querySelectorAll(s)],escapeHtml=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c])),formatDate=v=>new Intl.DateTimeFormat("fr-FR",{day:"numeric",month:"long",year:"numeric"}).format(new Date(`${v}T12:00:00`));
let appState=loadLocal(),currentProfile=null,currentView="home",searchTerm="";
function loadLocal(){try{return Object.assign({profiles:{},requests:[]},JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}"))}catch{return{profiles:{},requests:[]}}}

function profileData(){if(!currentProfile)return{list:[],prefs:{density:"comfortable",motion:true,trailer:true}};appState.profiles[currentProfile.id]||={list:[],prefs:{density:"comfortable",motion:true,trailer:true}};return appState.profiles[currentProfile.id]}

function toast(message){const item=document.createElement("div");item.textContent=message;byId("toast").appendChild(item);setTimeout(()=>item.remove(),3000)}
async function sha256(value){const bytes=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(value));return[...new Uint8Array(bytes)].map(b=>b.toString(16).padStart(2,"0")).join("")}
function unlockHeroMedia(){const video=byId("heroVideo");if(!video||video.dataset.unlocked)return;video.dataset.unlocked="1";video.muted=true;video.play().then(()=>{video.pause();video.currentTime=0;video.muted=false}).catch(()=>{video.dataset.unlocked=""})}
function renderProfiles(){byId("profileGrid").innerHTML=PROFILES.map(p=>`<button class="profile" data-profile="${p.id}"><img src="${p.avatar}" alt=""><strong>${escapeHtml(p.name)}</strong></button>`).join("");all(".profile").forEach(b=>b.onclick=()=>openPin(PROFILES.find(p=>p.id===b.dataset.profile)))}
function openPin(profile){let pin="";byId("modalRoot").innerHTML=`<div class="modal"><div class="pin-box"><h2>${escapeHtml(profile.name)}</h2><div id="pinDots" class="pin-dots">${"<i></i>".repeat(4)}</div><div class="keypad">${[1,2,3,4,5,6,7,8,9].map(d=>`<button data-digit="${d}">${d}</button>`).join("")}<button class="utility" data-action="clear">Effacer</button><button data-digit="0">0</button><button class="utility" data-action="back">⌫</button></div><div id="pinError" class="pin-error"></div></div></div>`;const update=async()=>{all("#pinDots i").forEach((d,i)=>d.classList.toggle("on",i<pin.length));if(pin.length===4){if(await sha256(PIN_SALT+pin)===profile.pinHash){closeModal();openProfile(profile)}else{byId("pinError").textContent="Code incorrect";setTimeout(()=>{pin="";byId("pinError").textContent="";update()},500)}}};all("[data-digit]").forEach(b=>b.onclick=()=>{unlockHeroMedia();if(pin.length<4){pin+=b.dataset.digit;update()}});all("[data-action]").forEach(b=>b.onclick=()=>{pin=b.dataset.action==="clear"?"":pin.slice(0,-1);update()})}
function openProfile(profile){currentProfile=profile;profileData();applyPreferences();byId("profiles").classList.add("hidden");byId("app").classList.remove("hidden");byId("profileMenu").innerHTML=`<img src="${profile.avatar}" alt=""><strong>${escapeHtml(profile.name)}</strong>`;setView("home")}
function backToProfiles(){closeModal();byId("app").classList.add("hidden");byId("profiles").classList.remove("hidden");currentProfile=null;searchTerm="";byId("search").value=""}
function setView(view){currentView=view;all(".nav button").forEach(b=>b.classList.toggle("active",b.dataset.view===view));byId("hero").classList.toggle("hidden",view!=="home"||Boolean(searchTerm));render();scrollTo({top:0,behavior:"smooth"})}
function filteredFilms(){const q=searchTerm.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");let films=FILMS;if(q)films=films.filter(f=>`${f.title} ${f.category}`.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").includes(q));if(currentView==="list")films=films.filter(f=>profileData().list.includes(f.id));return films.slice().sort((a,b)=>(b.year||0)-(a.year||0)||a.title.localeCompare(b.title,"fr"))}
function recommendations(){const prefs=PROFILE_CATEGORIES[currentProfile?.id]||PROFILE_CATEGORIES.invite;return FILMS.slice().sort((a,b)=>{const score=f=>{const categoryRank=prefs.indexOf(f.category),taste=categoryRank<0?0:(prefs.length-categoryRank)*70,recency=f.year?Math.max(0,f.year-1990)*1.4:0,quality=hashNumber(f.id)%37;return taste+recency+quality};return score(b)-score(a)})}
function visualStyle(value){return`--hue:${hashNumber(value)%300+25}`}
function filmCard(f){return`<button class="card" data-film="${f.id}" style="${visualStyle(f.title)}"><div class="thumb"><span class="fallback-letter">${escapeHtml(f.title[0])}</span>${f.poster?`<img class="poster-image" src="${escapeHtml(f.poster)}" alt="" loading="lazy" decoding="async" referrerpolicy="no-referrer" onerror="this.remove()">`:""}</div><div class="card-copy"><div class="card-title">${escapeHtml(f.title)}</div><div class="card-meta">${f.year?`<span>${f.year}</span><span>•</span>`:""}<span>${escapeHtml(f.category)}</span></div></div></button>`}
function upcomingCard(f){return`<article class="card upcoming-card" style="${visualStyle(f.title+f.genre)}"><div class="thumb"><span class="fallback-letter">${escapeHtml(f.title[0])}</span>${f.poster?`<img class="poster-image" src="${escapeHtml(f.poster)}" alt="" loading="lazy" decoding="async" referrerpolicy="no-referrer" onerror="this.remove()">`:""}<span class="soon-mark">2026</span></div><span class="date-badge">${escapeHtml(formatDate(f.date))}</span><div class="card-copy"><div class="card-title">${escapeHtml(f.title)}</div><div class="card-meta"><span>Bientôt</span><span>•</span><span>${escapeHtml(f.genre)}</span></div></div></article>`}
function section(title,films){return`<section class="section"><div class="section-head"><h2>${escapeHtml(title)}</h2><small>${films.length} titres</small></div><div class="row">${films.map(filmCard).join("")}</div></section>`}
function render(){const content=byId("content"),future=UPCOMING.filter(f=>new Date(`${f.date}T23:59:59`).getTime()>Date.now()).sort((a,b)=>a.date.localeCompare(b.date)),genreRow=genre=>FILMS.filter(f=>f.category===genre).sort((a,b)=>(b.year||0)-(a.year||0)||a.title.localeCompare(b.title,"fr")).slice(0,20);if(searchTerm||currentView==="films"||currentView==="list"){const films=filteredFilms(),title=searchTerm?`Résultats pour “${searchTerm}”`:currentView==="list"?"Ma liste":"Tous les films";content.classList.add("catalogue");content.innerHTML=`<div class="catalogue-title"><h1>${escapeHtml(title)}</h1><strong>${films.length} / 443</strong></div>${films.length?`<div class="grid">${films.map(filmCard).join("")}</div>`:`<div class="empty">Aucun film</div>`}`}else if(currentView==="upcoming"){content.classList.add("catalogue");content.innerHTML=`<div class="catalogue-title"><h1>À venir en 2026</h1><strong>${future.length} sorties</strong></div><div class="grid">${future.map(upcomingCard).join("")}</div>`}else{content.classList.remove("catalogue");const rec=recommendations().slice(0,20),new2026=FILMS.filter(f=>f.year===2026).sort((a,b)=>a.title.localeCompare(b.title,"fr")),recent=FILMS.filter(f=>f.year===2025||f.year===2024).sort((a,b)=>b.year-a.year||a.title.localeCompare(b.title,"fr")).slice(0,20),classics=FILMS.filter(f=>f.year&&f.year<=2005).sort((a,b)=>b.year-a.year).slice(0,20),family=FILMS.filter(f=>["Animation","Aventure","Comédie"].includes(f.category)).sort((a,b)=>(b.year||0)-(a.year||0)).slice(0,20);content.innerHTML=[section(`Pour ${currentProfile.name}`,rec),section("Nouveautés disponibles en 2026",new2026),section("Ajouts récents",recent),section("Films d'action",genreRow("Action")),section("Horreur & tension",genreRow("Horreur")),section("Animation",genreRow("Animation")),section("Science-fiction",genreRow("Science-fiction")),section("Comédies",genreRow("Comédie")),section("Thrillers",genreRow("Thriller")),section("Aventure",genreRow("Aventure")),section("Romance",genreRow("Romance")),section("Films historiques",genreRow("Histoire")),section("Classiques",classics),section("Pour toute la famille",family),`<section class="section"><div class="section-head"><h2>À venir en 2026</h2><small>${future.length} sorties</small></div><div class="row">${future.map(upcomingCard).join("")}</div></section>`].join("")}bindCards();updateHeroList()}
function bindCards(){all("[data-film]").forEach(c=>c.onclick=()=>openFilm(FILMS.find(f=>f.id===c.dataset.film)))}
function openFilm(film){const listed=profileData().list.includes(film.id);byId("modalRoot").innerHTML=`<div class="modal"><article class="modal-card"><div class="modal-head"><strong>N stream</strong><button class="close" data-close>×</button></div><div class="modal-body"><h2>${escapeHtml(film.title)}</h2><div class="card-meta">${film.year?`<span>${film.year}</span><span>•</span>`:""}<span>${escapeHtml(film.category)}</span></div><div class="actions"><button class="primary" id="playFilm">▶ Lecture</button><button class="secondary" id="toggleFilm">${listed?"✓ Dans ma liste":"＋ Ma liste"}</button></div></div></article></div>`;all("[data-close]").forEach(b=>b.onclick=closeModal);byId("playFilm").onclick=()=>playFilm(film);byId("toggleFilm").onclick=()=>{toggleFilm(film);openFilm(film)}}

function boot(){renderProfiles();const audio=byId("logoAudio"),introStart=Date.now(),playLogo=()=>{if(Number.isFinite(audio.duration))audio.playbackRate=audio.duration/4;const elapsed=(Date.now()-introStart)/1000;audio.currentTime=Math.min((audio.duration||4)-.05,elapsed*audio.playbackRate);audio.play().catch(()=>{})};if(audio.readyState>=1)playLogo();else audio.onloadedmetadata=playLogo;document.addEventListener("pointerdown",()=>{if(audio.paused&&Date.now()-introStart<4000)playLogo()},{once:true});setTimeout(()=>{audio.pause();byId("splash").classList.add("hidden");byId("profiles").classList.remove("hidden")},4000);byId("homeButton").onclick=()=>setView("home");byId("profileMenu").onclick=backToProfiles;byId("settingsButton").onclick=openSettings;byId("heroList").onclick=()=>{const data=profileData();data.list=data.list.includes("aventure-croisee")?data.list.filter(id=>id!=="aventure-croisee"):["aventure-croisee",...data.list];saveLocal();updateHeroList()};all(".nav button").forEach(b=>b.onclick=()=>setView(b.dataset.view));byId("search").oninput=e=>{searchTerm=e.target.value.trim();byId("hero").classList.toggle("hidden",Boolean(searchTerm)||currentView!=="home");render()};const hero=byId("hero"),video=byId("heroVideo"),startHero=()=>{if(profileData().prefs.trailer===false||!video.paused)return;video.muted=false;video.volume=1;video.currentTime=0;video.play().then(()=>hero.classList.add("trailer-on")).catch(()=>hero.classList.remove("trailer-on"))},stopHero=()=>{video.pause();video.currentTime=0;hero.classList.remove("trailer-on")};hero.onmouseenter=startHero;hero.onpointerenter=startHero;hero.onmouseleave=stopHero;hero.onpointerleave=stopHero;window.onscroll=()=>byId("topbar").classList.toggle("solid",scrollY>20);document.onkeydown=e=>{if(e.key==="Escape")closeModal()}}
